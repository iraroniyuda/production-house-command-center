name: phcc-local

services:
  phcc-db:
    image: postgres:16.14-bookworm
    environment:
      POSTGRES_DB: ${PHCC_DB_NAME}
      POSTGRES_USER: ${PHCC_DB_USER}
      POSTGRES_PASSWORD: ${PHCC_DB_PASSWORD}
    ports:
      - "127.0.0.1:${PHCC_POSTGRES_PORT}:5432"
    volumes:
      - phcc_db_data:/var/lib/postgresql/data
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U ${PHCC_DB_USER} -d ${PHCC_DB_NAME}
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s
    restart: unless-stopped

  keycloak-db:
    image: postgres:16.14-bookworm
    environment:
      POSTGRES_DB: ${KEYCLOAK_DB_NAME}
      POSTGRES_USER: ${KEYCLOAK_DB_USER}
      POSTGRES_PASSWORD: ${KEYCLOAK_DB_PASSWORD}
    volumes:
      - keycloak_db_data:/var/lib/postgresql/data
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U ${KEYCLOAK_DB_USER} -d ${KEYCLOAK_DB_NAME}
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s
    restart: unless-stopped

  keycloak:
    image: quay.io/keycloak/keycloak:26.7.0
    command:
      - start-dev
      - --import-realm
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://keycloak-db:5432/${KEYCLOAK_DB_NAME}
      KC_DB_USERNAME: ${KEYCLOAK_DB_USER}
      KC_DB_PASSWORD: ${KEYCLOAK_DB_PASSWORD}

      KC_BOOTSTRAP_ADMIN_USERNAME: ${KEYCLOAK_ADMIN_USERNAME}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}

      KC_HEALTH_ENABLED: "true"
      KC_METRICS_ENABLED: "true"
    ports:
      - "127.0.0.1:${KEYCLOAK_PORT}:8080"
      - "127.0.0.1:${KEYCLOAK_MANAGEMENT_PORT}:9000"
    volumes:
      - ./keycloak/import:/opt/keycloak/data/import:ro
    depends_on:
      keycloak-db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  phcc_db_data:
  keycloak_db_data: