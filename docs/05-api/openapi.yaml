openapi: 3.1.0
info:
  title: Production House Command Center API
  version: 0.1.0
servers:
  - url: /api/v1
paths:
  /organizations/{organizationId}/projects:
    get:
      summary: List projects in an organization
      parameters:
        - in: path
          name: organizationId
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Project list
    post:
      summary: Create a project
      parameters:
        - in: path
          name: organizationId
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '201':
          description: Project created
  /call-sheets/{callSheetId}/publish:
    post:
      summary: Publish a call sheet revision
      parameters:
        - in: path
          name: callSheetId
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Call sheet published
        '409':
          description: Invalid state or version conflict
  /shooting-days/{shootingDayId}/wrap:
    post:
      summary: Wrap a shooting day
      parameters:
        - in: path
          name: shootingDayId
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Shooting day wrapped
components:
  schemas:
    Problem:
      type: object
      required: [type, title, status, traceId]
      properties:
        type:
          type: string
        title:
          type: string
        status:
          type: integer
        detail:
          type: string
        ruleId:
          type: string
        traceId:
          type: string
