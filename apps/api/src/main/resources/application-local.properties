# Local HTTP runtime
server.port=${PHCC_API_PORT:8081}

# Local PHCC PostgreSQL
spring.datasource.url=${PHCC_DB_URL:jdbc:postgresql://localhost:15432/phcc}
spring.datasource.username=${PHCC_DB_USER:phcc}
spring.datasource.password=${PHCC_DB_PASSWORD:phcc_local_change_me}

# Local Keycloak resource server
spring.security.oauth2.resourceserver.jwt.issuer-uri=${PHCC_OIDC_ISSUER_URI:http://localhost:8080/realms/phcc}
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=${PHCC_OIDC_JWK_SET_URI:http://localhost:8080/realms/phcc/protocol/openid-connect/certs}

# Local web origin
phcc.web.origin=${PHCC_WEB_ORIGIN:http://localhost:3000}

# Local observability
management.endpoint.health.show-details=always